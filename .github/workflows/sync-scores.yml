name: Sync scores from Google Sheet

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas

      - name: Sync sheet → data/scores.csv
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        run: python tools/sync_sheet_to_csv.py --strict

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.csv
          if git diff --staged --quiet; then
            echo "No changes to scores.csv"
          else
            git commit -m "Sync scores from Google Sheet"
            git push
          fi
